<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Document</title>
    </head>
    <body>
        <!-- Additional HTML Elements: HTML Fieldset and legend Tag-->
        <form action="">
            <fieldset name="personal-details">
                <legend>Personal details</legend>

                <label for="fname">First name:</label>
                <input
                    type="text"
                    id="fname"
                    class="fname"
                    name="fname"
                />
                <br />

                <label for="lname">Last name:</label>
                <input
                    type="text"
                    id="lname"
                    class="lname"
                    name="lname"
                />
                <br />

                <label for="email">Email:</label>
                <input
                    type="email"
                    id="email"
                    class="email"
                    name="email"
                />
                <br />

                <label for="phone">Phone Number:</label>
                <input
                    type="tel"
                    id="phone"
                    class="phone"
                    name="phone"
                />
                <br />
            </fieldset>

            <fieldset name="professional-details">
                <legend>Professional details</legend>
                <label for="occupation">Occupation:</label>
                <input
                    type="text"
                    id="occupation"
                    class="occupation"
                    name="occupation"
                />
                <br />

                <label for="company">Company:</label>
                <input
                    type="text"
                    id="company"
                    class="company"
                    name="company"
                />
                <br />

                <label for="start">Start Date:</label>
                <input
                    type="date"
                    id="start"
                    class="start"
                    name="start"
                />
                <br />

                <label for="end">End Date:</label>
                <input type="date" id="end" class="end" name="end" />
                <br />
            </fieldset>
        </form>
    </body>
</html>
